<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Match Cards">
    
    <!-- Inline PWA Manifest (Base64 Encoded) -->
    <!-- Decodes to: {"name":"Match Cards","short_name":"Match","display":"standalone","background_color":"#000000","theme_color":"#000000"} -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiTWF0Y2ggQ2FyZHMiLCJzaG9ydF9uYW1lIjoiTWF0Y2giLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMDAwMDAwIiwidGhlbWVfY29sb3IiOiIjMDAwMDAwIn0=">

    <title>Match Cards</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- iziToast CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --primary-yellow: #fdf036;
            --primary-purple: #c6abff;
            --outline-purple: #5c4b7a;
            --card-purple: #d2bdf7;
            --text-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Screens --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
            padding: 30px 25px;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* --- Start Screen --- */
        #start-screen {
            justify-content: space-between;
            padding-bottom: 25px;
            padding-top: 40px;
        }

        .typography-art {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 0; /* Ensures flex child can shrink */
        }

        .letter-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .letter {
            font-size: min(16vh, 40vw);
            line-height: 0.8;
            font-weight: 400;
            color: transparent;
            -webkit-text-stroke: 3px var(--outline-purple);
            text-align: center;
            transition: all 0.2s ease-in-out;
        }

        /* Highlight Animation Style */
        .letter.highlight {
            color: var(--primary-purple);
            -webkit-text-stroke: 0px transparent;
            text-shadow: 0 0 15px rgba(198, 171, 255, 0.4);
            transform: scale(1.05);
        }

        .bottom-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        .btn-start {
            background-color: var(--primary-yellow);
            color: #000;
            border: none;
            width: 100%;
            padding: 22px;
            font-size: 1.2rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-start:active { transform: scale(0.97); }

        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* --- Game Screen --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
        }

        .logo-small {
            color: var(--primary-purple);
            font-size: 1.2rem;
            line-height: 1.1;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
            transition: background 0.2s;
        }

        .btn-icon:active { background: rgba(255,255,255,0.1); }
        .btn-icon svg { width: 20px; height: 20px; fill: currentColor; }

        .timer-section {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }

        .timer-small {
            color: var(--primary-yellow);
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: -5px;
        }

        .timer-large {
            color: #fff;
            font-size: 3.8rem;
            font-weight: 500;
            line-height: 1;
            letter-spacing: 2px;
        }
        
        .timer-large span { font-size: 0.5em; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
            align-content: start;
        }

        /* --- Card Flip Animation --- */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-front {
            background-color: var(--card-purple);
            transition: background-color 0.3s;
        }

        .card:hover .card-front {
            background-color: #e0d0f8;
        }

        .card-back {
            background-color: #222;
            border: 2px solid var(--card-purple);
            transform: rotateY(180deg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }

        .card.matched .card-back {
            background-color: #111;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 15px rgba(253, 240, 54, 0.2);
        }

        /* SweetAlert Customization */
        .swal2-popup {
            background: #111 !important;
            color: #fff !important;
            border-radius: 20px !important;
            border: 1px solid var(--primary-purple) !important;
        }
        .swal2-title { color: var(--primary-yellow) !important; }
        .swal2-confirm {
            background-color: var(--primary-yellow) !important;
            color: #000 !important;
            border-radius: 10px !important;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 500 !important;
            padding: 12px 30px !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <div class="typography-art">
                <!-- Left Column (MATCH read top to bottom = H C T A M -> read upwards) -->
                <div class="letter-col">
                    <span class="letter" data-seq="4">H</span>
                    <span class="letter" data-seq="3">C</span>
                    <span class="letter" data-seq="2">T</span>
                    <span class="letter" data-seq="1">A</span>
                    <span class="letter" data-seq="0">M</span>
                </div>
                <!-- Right Column (CARDS read top to bottom = S D R A C -> read upwards) -->
                <div class="letter-col">
                    <span class="letter" data-seq="9">S</span>
                    <span class="letter" data-seq="8">D</span>
                    <span class="letter" data-seq="7">R</span>
                    <span class="letter" data-seq="6">A</span>
                    <span class="letter" data-seq="5">C</span>
                </div>
            </div>
            
            <div class="bottom-actions">
                <button id="btn-start" class="btn-start">New Game</button>
                <div class="footer-text">Designed and developed bytt</div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen">
            <header>
                <div class="logo-small">MATCH<br>CARDS</div>
                <button id="btn-sound" class="btn-icon">
                    <svg id="icon-sound-on" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg id="icon-sound-off" viewBox="0 0 24 24" style="display:none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
            </header>

            <div class="timer-section">
                <div class="timer-small" id="timer-small">00:00.00</div>
                <div class="timer-large" id="timer-large">00:00<span>.00</span></div>
            </div>

            <div class="board" id="board">
                <!-- Cards injected here -->
            </div>
        </div>

    </div>

    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>

    <script>
        // --- PWA Inline Service Worker Setup ---
        const swCode = `
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { return self.clients.claim(); });
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => new Response('Offline - PWA is cached.')));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // --- Start Screen Letter Animation ---
        const letters = Array.from(document.querySelectorAll('.letter')).sort((a, b) => {
            return parseInt(a.dataset.seq) - parseInt(b.dataset.seq);
        });
        
        let currentHighlightIndex = 0;
        let highlightInterval;

        function startLetterAnimation() {
            if(highlightInterval) clearInterval(highlightInterval);
            
            // Immediately highlight the first one to avoid delay
            letters.forEach(l => l.classList.remove('highlight'));
            letters[0].classList.add('highlight');
            currentHighlightIndex = 1;

            highlightInterval = setInterval(() => {
                letters.forEach(l => l.classList.remove('highlight'));
                letters[currentHighlightIndex].classList.add('highlight');
                currentHighlightIndex = (currentHighlightIndex + 1) % letters.length;
            }, 400); // Sequence delay
        }

        function stopLetterAnimation() {
            clearInterval(highlightInterval);
        }

        // Start animation immediately
        startLetterAnimation();

        // --- Configuration & State ---
        const emojis = ['😀', '🐶', '🍕', '🚗', '⭐', '🎧'];
        let cardArray = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;
        
        // Timer vars
        let startTime = 0;
        let timerInterval;
        let isTimerRunning = false;
        let elapsedTime = 0;

        // Audio state
        let soundEnabled = true;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const btnStart = document.getElementById('btn-start');
        const board = document.getElementById('board');
        const timerSmall = document.getElementById('timer-small');
        const timerLarge = document.getElementById('timer-large');
        const btnSound = document.getElementById('btn-sound');
        const iconSoundOn = document.getElementById('icon-sound-on');
        const iconSoundOff = document.getElementById('icon-sound-off');

        // Setup iziToast defaults
        iziToast.settings({
            position: 'topCenter',
            timeout: 1000,
            transitionIn: 'fadeInDown',
            transitionOut: 'fadeOutUp',
            theme: 'dark',
            backgroundColor: '#2a2a2a',
            progressBarColor: '#c6abff'
        });

        // --- Audio Synthesizer ---
        function playTone(frequency, type, duration) {
            if (!soundEnabled) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playSoundFlip() { playTone(300, 'sine', 0.1); }
        function playSoundMatch() { 
            playTone(600, 'triangle', 0.1); 
            setTimeout(() => playTone(800, 'triangle', 0.15), 100);
        }
        function playSoundWin() {
            playTone(400, 'sine', 0.1);
            setTimeout(() => playTone(500, 'sine', 0.1), 100);
            setTimeout(() => playTone(600, 'sine', 0.3), 200);
        }

        // --- Timer Logic ---
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            const milliseconds = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
            return { minutes, seconds, milliseconds };
        }

        function updateTimerDisplay() {
            const now = Date.now();
            elapsedTime = now - startTime;
            const t = formatTime(elapsedTime);
            
            timerSmall.innerText = `${t.minutes}:${t.seconds}.${t.milliseconds}`;
            timerLarge.innerHTML = `${t.minutes}:${t.seconds}<span>.${t.milliseconds}</span>`;
            
            if (isTimerRunning) {
                timerInterval = requestAnimationFrame(updateTimerDisplay);
            }
        }

        function startTimer() {
            if (!isTimerRunning) {
                startTime = Date.now() - elapsedTime;
                isTimerRunning = true;
                timerInterval = requestAnimationFrame(updateTimerDisplay);
            }
        }

        function stopTimer() {
            isTimerRunning = false;
            cancelAnimationFrame(timerInterval);
        }

        function resetTimer() {
            stopTimer();
            elapsedTime = 0;
            timerSmall.innerText = "00:00.00";
            timerLarge.innerHTML = "00:00<span>.00</span>";
        }

        // --- Game Logic ---
        function initGame() {
            // Stop background text animation to save CPU
            stopLetterAnimation();

            startScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            resetTimer();
            matchedPairs = 0;
            hasFlippedCard = false;
            board.innerHTML = '';
            
            cardArray = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            
            cardArray.forEach((emoji) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;
                
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });

            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            if (!isTimerRunning && matchedPairs === 0 && !hasFlippedCard) {
                startTimer();
            }

            this.classList.add('flipped');
            playSoundFlip();

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            const isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            playSoundMatch();
            iziToast.show({
                title: 'Match Found!',
                icon: '✨',
                color: '#d2bdf7',
                titleColor: '#000'
            });

            matchedPairs++;
            resetBoard();

            if (matchedPairs === emojis.length) {
                setTimeout(winGame, 500);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                playSoundFlip(); 
                resetBoard();
            }, 700);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function winGame() {
            stopTimer();
            playSoundWin();
            
            const finalTime = timerSmall.innerText;

            Swal.fire({
                title: 'You Win!',
                text: `All cards matched!\nTime: ${finalTime}`,
                icon: 'success',
                confirmButtonText: 'Play Again',
                allowOutsideClick: false,
                backdrop: `rgba(0,0,0,0.85)`
            }).then((result) => {
                if (result.isConfirmed) {
                    gameScreen.classList.remove('active');
                    startScreen.classList.add('active');
                    // Restart background animation
                    startLetterAnimation();
                }
            });
        }

        // --- Event Listeners ---
        btnStart.addEventListener('click', initGame);

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                iconSoundOn.style.display = 'block';
                iconSoundOff.style.display = 'none';
                iziToast.info({ title: 'Sound On', icon: '🔊' });
            } else {
                iconSoundOn.style.display = 'none';
                iconSoundOff.style.display = 'block';
                iziToast.info({ title: 'Sound Off', icon: '🔇' });
            }
        });

    </script>
</body>
</html>
