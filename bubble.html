<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anshu Shooter - Bubble Shooter Game</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- iziToast -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Segoe UI', 'Roboto', 'Helvetica', 'sans-serif'],
                    },
                    colors: {
                        ios: {
                            red: '#FF3B30',
                            blue: '#007AFF',
                            green: '#34C759',
                            yellow: '#FFCC00',
                            purple: '#AF52DE',
                            cyan: '#32ADE6'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Essential UI overrides & iOS aesthetics */
        body {
            overscroll-behavior: none; /* Prevent pull-to-refresh */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .ios-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        .dark .ios-shadow {
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.05);
        }
        /* Smooth transitions */
        .page-transition {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .page-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        .page-active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        canvas {
            touch-action: none; /* Crucial for custom swipe controls */
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-black dark:text-white transition-colors duration-300 overflow-hidden w-screen h-screen">

    <!-- PAGE 1: START PAGE -->
    <div id="start-page" class="absolute inset-0 flex flex-col items-center justify-center page-transition page-active z-50">
        
        <!-- Controls (Top Right) -->
        <div class="absolute top-6 right-6 flex gap-4">
            <!-- Fullscreen Toggle -->
            <button id="fullscreen-btn" class="p-3 bg-white dark:bg-zinc-800 rounded-full ios-shadow active:scale-95 transition-transform">
                <svg id="fullscreen-icon" class="w-6 h-6 text-black dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
            </button>
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="p-3 bg-white dark:bg-zinc-800 rounded-full ios-shadow active:scale-95 transition-transform">
                <svg id="theme-icon-moon" class="w-6 h-6 text-black hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
                <svg id="theme-icon-sun" class="w-6 h-6 text-black dark:text-white block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </button>
        </div>

        <!-- Title -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tight mb-2">ANSHU<br><span class="text-ios-blue">SHOOTER</span></h1>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Bubble Shooter Game</p>
        </div>

        <!-- Play Button -->
        <button id="start-btn" class="bg-black dark:bg-white text-white dark:text-black font-bold text-lg px-12 py-4 rounded-2xl ios-shadow active:scale-95 transition-transform">
            START GAME
        </button>

    </div>

    <!-- PAGE 2: GAME PAGE -->
    <div id="game-page" class="absolute inset-0 flex flex-col page-transition page-hidden bg-gray-100 dark:bg-zinc-900">
        
        <!-- Top UI Bar -->
        <div class="h-16 w-full max-w-2xl mx-auto flex items-center justify-between px-4 z-10">
            <button id="back-btn" class="p-2 text-black dark:text-white active:scale-95 transition-transform flex items-center font-semibold">
                <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </button>
            <div class="flex gap-6 text-center font-bold text-lg text-black dark:text-white">
                <div>Level: <span id="level-display" class="text-ios-blue">1</span></div>
                <div>Score: <span id="score-display">0</span></div>
            </div>
        </div>

        <!-- Game Area (Canvas Container) -->
        <div id="game-container" class="flex-1 w-full max-w-2xl mx-auto relative overflow-hidden bg-white dark:bg-black ios-shadow sm:rounded-t-3xl border-t sm:border-x border-gray-200 dark:border-zinc-800 shadow-xl">
            <canvas id="game-canvas" class="w-full h-full"></canvas>
        </div>

    </div>

    <script>
        /* =========================================================================
         * 1. UI & THEME CONTROLLER
         * ========================================================================= */
        const themeToggleBtn = document.getElementById('theme-toggle');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const startBtn = document.getElementById('start-btn');
        const backBtn = document.getElementById('back-btn');
        const startPage = document.getElementById('start-page');
        const gamePage = document.getElementById('game-page');
        
        // Setup Theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        // Fullscreen Toggle
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        // Page Navigation
        startBtn.addEventListener('click', () => {
            startPage.classList.remove('page-active');
            startPage.classList.add('page-hidden');
            setTimeout(() => {
                gamePage.classList.remove('page-hidden');
                gamePage.classList.add('page-active');
                initGame();
            }, 300);
        });

        backBtn.addEventListener('click', () => {
            Swal.fire({
                title: 'Quit Game?',
                text: "Your current progress will be lost.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#FF3B30',
                cancelButtonColor: '#8E8E93',
                confirmButtonText: 'Yes, quit',
                background: document.documentElement.classList.contains('dark') ? '#1c1c1e' : '#fff',
                color: document.documentElement.classList.contains('dark') ? '#fff' : '#000',
            }).then((result) => {
                if (result.isConfirmed) {
                    gameEngine.stop();
                    gamePage.classList.remove('page-active');
                    gamePage.classList.add('page-hidden');
                    setTimeout(() => {
                        startPage.classList.remove('page-hidden');
                        startPage.classList.add('page-active');
                    }, 300);
                }
            });
        });

        /* =========================================================================
         * 2. AUDIO SYNTHESIZER (No External Files)
         * ========================================================================= */
        const AudioSys = (() => {
            let audioCtx = null;
            const init = () => {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            };
            
            const playShoot = () => {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            };

            const playPop = () => {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            };

            return { init, playShoot, playPop };
        })();

        /* =========================================================================
         * 3. CORE GAME ENGINE
         * ========================================================================= */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        const COLORS = ['#FF3B30', '#007AFF', '#34C759', '#FFCC00', '#AF52DE', '#32ADE6'];
        
        let gameEngine = null;

        function initGame() {
            AudioSys.init();
            
            // Adjust canvas size to actual pixel size of container for sharp rendering
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            if (gameEngine) gameEngine.stop();
            gameEngine = new GameEngine(canvas.width, canvas.height);
            gameEngine.start();
        }

        // Handle Resize / Orientation Change
        window.addEventListener('resize', () => {
            if(gamePage.classList.contains('page-active') && gameEngine) {
                const rect = container.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                gameEngine.resize(canvas.width, canvas.height);
            }
        });

        class GameEngine {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.isRunning = false;
                this.score = 0;
                this.level = 1;

                // Physics Constants
                this.cols = 11;
                this.bubbleRadius = this.width / (this.cols * 2);
                this.rowHeight = this.bubbleRadius * Math.sqrt(3);
                this.maxRows = Math.floor(this.height / this.rowHeight) - 2; 

                // Game State
                this.grid = []; // 2D array of bubbles
                this.activeBubble = null; // The bubble being shot
                this.nextColor = this.getRandomColor();
                this.loadedColor = this.getRandomColor();
                this.shooterAngle = Math.PI / 2; // Pointing up (90 deg)
                this.pointer = { x: width / 2, y: height - 100, active: false };
                this.shooterPos = { x: width / 2, y: height - this.bubbleRadius * 2 };
                
                this.fallingBubbles = [];
                this.popAnimations = [];

                this.bindEvents();
                this.buildLevel(this.level);
                this.updateUI();
                
                iziToast.show({
                    title: 'Level 1 Start!',
                    color: 'blue',
                    position: 'topCenter',
                    timeout: 2000
                });
            }

            resize(w, h) {
                this.width = w;
                this.height = h;
                this.bubbleRadius = this.width / (this.cols * 2);
                this.rowHeight = this.bubbleRadius * Math.sqrt(3);
                this.shooterPos = { x: this.width / 2, y: this.height - this.bubbleRadius * 2 };
                
                // Recalculate grid positions based on new radius
                for(let r=0; r<this.grid.length; r++) {
                    for(let c=0; c<this.grid[r].length; c++) {
                        if(this.grid[r][c]) {
                            const pos = this.getGridCoords(r, c);
                            this.grid[r][c].x = pos.x;
                            this.grid[r][c].y = pos.y;
                        }
                    }
                }
            }

            getRandomColor() {
                // Return colors currently on board to prevent un-winnable scenarios, else random
                const activeColors = new Set();
                this.grid.forEach(row => row.forEach(b => { if(b) activeColors.add(b.color); }));
                const available = activeColors.size > 0 ? Array.from(activeColors) : COLORS;
                return available[Math.floor(Math.random() * available.length)];
            }

            buildLevel(level) {
                this.grid = [];
                // Level defines starting rows (e.g. Lvl 1: 4 rows, Lvl 2: 5 rows...)
                const startingRows = Math.min(3 + level, this.maxRows - 5);
                
                for (let r = 0; r < this.maxRows; r++) {
                    const rowCols = (r % 2 === 0) ? this.cols : this.cols - 1;
                    const row = new Array(rowCols).fill(null);
                    
                    if (r < startingRows) {
                        for (let c = 0; c < rowCols; c++) {
                            const pos = this.getGridCoords(r, c);
                            row[c] = { color: COLORS[Math.floor(Math.random() * COLORS.length)], x: pos.x, y: pos.y };
                        }
                    }
                    this.grid.push(row);
                }
            }

            getGridCoords(r, c) {
                const isOdd = r % 2 !== 0;
                const x = (c * this.bubbleRadius * 2) + this.bubbleRadius + (isOdd ? this.bubbleRadius : 0);
                const y = (r * this.rowHeight) + this.bubbleRadius;
                return { x, y };
            }

            // Input Handling
            bindEvents() {
                this.handlePointerMove = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    this.pointer.x = clientX - rect.left;
                    this.pointer.y = clientY - rect.top;
                    this.pointer.active = true;
                    
                    const dx = this.pointer.x - this.shooterPos.x;
                    const dy = this.pointer.y - this.shooterPos.y;
                    this.shooterAngle = Math.atan2(dy, dx);
                    
                    // Constrain angle to shoot upwards only
                    if(this.shooterAngle > -0.1) this.shooterAngle = -0.1;
                    if(this.shooterAngle < -Math.PI + 0.1) this.shooterAngle = -Math.PI + 0.1;
                };

                this.handlePointerDown = (e) => {
                    this.handlePointerMove(e);
                };

                this.handlePointerUp = () => {
                    this.pointer.active = false;
                    this.shoot();
                };

                canvas.addEventListener('pointerdown', this.handlePointerDown);
                window.addEventListener('pointermove', this.handlePointerMove);
                window.addEventListener('pointerup', this.handlePointerUp);
            }

            removeEvents() {
                canvas.removeEventListener('pointerdown', this.handlePointerDown);
                window.removeEventListener('pointermove', this.handlePointerMove);
                window.removeEventListener('pointerup', this.handlePointerUp);
            }

            shoot() {
                if (this.activeBubble) return; // Already shooting
                
                AudioSys.playShoot();
                
                const speed = this.height * 0.03; // Responsive speed
                this.activeBubble = {
                    x: this.shooterPos.x,
                    y: this.shooterPos.y,
                    color: this.loadedColor,
                    vx: Math.cos(this.shooterAngle) * speed,
                    vy: Math.sin(this.shooterAngle) * speed
                };
                
                this.loadedColor = this.nextColor;
                this.nextColor = this.getRandomColor();
            }

            update() {
                // Update Flying Bubble Physics
                if (this.activeBubble) {
                    this.activeBubble.x += this.activeBubble.vx;
                    this.activeBubble.y += this.activeBubble.vy;

                    // Wall collision (Bounce)
                    if (this.activeBubble.x - this.bubbleRadius <= 0) {
                        this.activeBubble.x = this.bubbleRadius;
                        this.activeBubble.vx *= -1;
                    } else if (this.activeBubble.x + this.bubbleRadius >= this.width) {
                        this.activeBubble.x = this.width - this.bubbleRadius;
                        this.activeBubble.vx *= -1;
                    }

                    // Check Grid/Top Collision
                    if (this.activeBubble.y - this.bubbleRadius <= 0 || this.checkCollision()) {
                        this.snapBubble();
                    }
                }

                // Update Falling Bubbles
                for (let i = this.fallingBubbles.length - 1; i >= 0; i--) {
                    const fb = this.fallingBubbles[i];
                    fb.vy += 0.5; // Gravity
                    fb.x += fb.vx;
                    fb.y += fb.vy;
                    if (fb.y > this.height + this.bubbleRadius) {
                        this.fallingBubbles.splice(i, 1);
                    }
                }

                // Update Pop Animations
                for (let i = this.popAnimations.length - 1; i >= 0; i--) {
                    this.popAnimations[i].radius += 2;
                    this.popAnimations[i].alpha -= 0.1;
                    if (this.popAnimations[i].alpha <= 0) {
                        this.popAnimations.splice(i, 1);
                    }
                }
            }

            checkCollision() {
                for (let r = 0; r < this.grid.length; r++) {
                    for (let c = 0; c < this.grid[r].length; c++) {
                        const b = this.grid[r][c];
                        if (b) {
                            const dx = this.activeBubble.x - b.x;
                            const dy = this.activeBubble.y - b.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < this.bubbleRadius * 2 - 2) { // Slightly smaller to prevent early catch
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            snapBubble() {
                // Find closest empty grid spot
                let closestDist = Infinity;
                let snapRow = 0, snapCol = 0;

                for (let r = 0; r < this.grid.length; r++) {
                    const rowCols = (r % 2 === 0) ? this.cols : this.cols - 1;
                    for (let c = 0; c < rowCols; c++) {
                        if (!this.grid[r][c]) {
                            const pos = this.getGridCoords(r, c);
                            const dx = this.activeBubble.x - pos.x;
                            const dy = this.activeBubble.y - pos.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < closestDist) {
                                closestDist = dist;
                                snapRow = r;
                                snapCol = c;
                            }
                        }
                    }
                }

                // Place it
                const pos = this.getGridCoords(snapRow, snapCol);
                this.grid[snapRow][snapCol] = { color: this.activeBubble.color, x: pos.x, y: pos.y };
                const colorMatched = this.activeBubble.color;
                this.activeBubble = null;

                // Check Game Over (Reached bottom)
                if (snapRow >= this.maxRows - 1) {
                    this.gameOver(false);
                    return;
                }

                // Run Matches
                this.processMatches(snapRow, snapCol, colorMatched);
            }

            getNeighbors(r, c) {
                const isOdd = r % 2 !== 0;
                const neighbors = [
                    [r, c - 1], [r, c + 1],
                    [r - 1, isOdd ? c : c - 1], [r - 1, isOdd ? c + 1 : c],
                    [r + 1, isOdd ? c : c - 1], [r + 1, isOdd ? c + 1 : c]
                ];
                return neighbors.filter(([nr, nc]) => {
                    const rowCols = (nr % 2 === 0) ? this.cols : this.cols - 1;
                    return nr >= 0 && nr < this.grid.length && nc >= 0 && nc < rowCols;
                });
            }

            processMatches(startR, startC, color) {
                // BFS to find matching colors
                const matchCluster = [];
                const visited = new Set();
                const queue = [[startR, startC]];
                visited.add(`${startR},${startC}`);

                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    matchCluster.push({ r, c });

                    const neighbors = this.getNeighbors(r, c);
                    for (const [nr, nc] of neighbors) {
                        if (this.grid[nr][nc] && this.grid[nr][nc].color === color && !visited.has(`${nr},${nc}`)) {
                            visited.add(`${nr},${nc}`);
                            queue.push([nr, nc]);
                        }
                    }
                }

                if (matchCluster.length >= 3) {
                    AudioSys.playPop();
                    let points = matchCluster.length * 10;
                    
                    if(matchCluster.length > 3) {
                        points += (matchCluster.length - 3) * 5; // Bonus
                        iziToast.show({ title: 'Combo!', message: `+${points}`, color: 'green', position: 'topCenter', timeout: 1000 });
                    }

                    matchCluster.forEach(({ r, c }) => {
                        this.popAnimations.push({ x: this.grid[r][c].x, y: this.grid[r][c].y, color: this.grid[r][c].color, radius: this.bubbleRadius, alpha: 1 });
                        this.grid[r][c] = null;
                    });
                    
                    this.score += points;
                    this.updateUI();
                    
                    this.dropDisconnected();
                } else {
                    // Update next color pool safely
                    this.nextColor = this.getRandomColor();
                }

                this.checkWin();
            }

            dropDisconnected() {
                // BFS from top row to find connected bubbles
                const connected = new Set();
                const queue = [];

                for (let c = 0; c < this.cols; c++) {
                    if (this.grid[0][c]) {
                        queue.push([0, c]);
                        connected.add(`0,${c}`);
                    }
                }

                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    const neighbors = this.getNeighbors(r, c);
                    for (const [nr, nc] of neighbors) {
                        if (this.grid[nr][nc] && !connected.has(`${nr},${nc}`)) {
                            connected.add(`${nr},${nc}`);
                            queue.push([nr, nc]);
                        }
                    }
                }

                // Drop those not connected
                let droppedCount = 0;
                for (let r = 0; r < this.grid.length; r++) {
                    const rowCols = (r % 2 === 0) ? this.cols : this.cols - 1;
                    for (let c = 0; c < rowCols; c++) {
                        if (this.grid[r][c] && !connected.has(`${r},${c}`)) {
                            const b = this.grid[r][c];
                            this.fallingBubbles.push({
                                x: b.x, y: b.y, color: b.color,
                                vx: (Math.random() - 0.5) * 4, vy: -2
                            });
                            this.grid[r][c] = null;
                            droppedCount++;
                        }
                    }
                }
                if (droppedCount > 0) {
                    this.score += droppedCount * 20; // Bonus for dropping
                    this.updateUI();
                }
            }

            checkWin() {
                let isEmpty = true;
                for(let r=0; r<this.grid.length; r++) {
                    for(let c=0; c<this.grid[r].length; c++) {
                        if(this.grid[r][c]) { isEmpty = false; break; }
                    }
                    if(!isEmpty) break;
                }

                if (isEmpty) {
                    this.gameOver(true);
                }
            }

            updateUI() {
                document.getElementById('score-display').innerText = this.score;
                document.getElementById('level-display').innerText = this.level;
            }

            gameOver(win) {
                this.stop();
                const isDark = document.documentElement.classList.contains('dark');
                
                if (win) {
                    Swal.fire({
                        title: 'Level Cleared! 🎉',
                        text: `Score: ${this.score}`,
                        icon: 'success',
                        confirmButtonText: 'Next Level',
                        confirmButtonColor: '#34C759',
                        allowOutsideClick: false,
                        background: isDark ? '#1c1c1e' : '#fff',
                        color: isDark ? '#fff' : '#000',
                    }).then(() => {
                        this.level++;
                        this.buildLevel(this.level);
                        this.start();
                        iziToast.show({ title: `Level ${this.level}`, color: 'blue', position: 'topCenter', timeout: 2000 });
                    });
                } else {
                    Swal.fire({
                        title: 'Game Over',
                        text: `Final Score: ${this.score}`,
                        icon: 'error',
                        confirmButtonText: 'Try Again',
                        confirmButtonColor: '#FF3B30',
                        allowOutsideClick: false,
                        background: isDark ? '#1c1c1e' : '#fff',
                        color: isDark ? '#fff' : '#000',
                    }).then(() => {
                        this.score = 0;
                        this.level = 1;
                        this.buildLevel(this.level);
                        this.updateUI();
                        this.start();
                    });
                }
            }

            drawBubble(x, y, radius, color, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(x, y, radius - 1, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                
                // iOS soft highlight
                ctx.beginPath();
                ctx.arc(x - radius * 0.3, y - radius * 0.3, radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();
                ctx.restore();
            }

            draw() {
                ctx.clearRect(0, 0, this.width, this.height);

                // Draw Danger Line
                ctx.beginPath();
                const dangerY = this.height - this.bubbleRadius * 4;
                ctx.moveTo(0, dangerY);
                ctx.lineTo(this.width, dangerY);
                ctx.strokeStyle = document.documentElement.classList.contains('dark') ? 'rgba(255,59,48,0.3)' : 'rgba(255,59,48,0.2)';
                ctx.setLineDash([10, 10]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw Grid Bubbles
                for (let r = 0; r < this.grid.length; r++) {
                    const rowCols = (r % 2 === 0) ? this.cols : this.cols - 1;
                    for (let c = 0; c < rowCols; c++) {
                        const b = this.grid[r][c];
                        if (b) this.drawBubble(b.x, b.y, this.bubbleRadius, b.color);
                    }
                }

                // Draw Falling Bubbles
                this.fallingBubbles.forEach(b => this.drawBubble(b.x, b.y, this.bubbleRadius, b.color));

                // Draw Pop Animations
                this.popAnimations.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.restore();
                });

                // Draw Active Bubble
                if (this.activeBubble) {
                    this.drawBubble(this.activeBubble.x, this.activeBubble.y, this.bubbleRadius, this.activeBubble.color);
                }

                // Draw Shooter Mechanism
                
                // Trajectory Line
                if (this.pointer.active && !this.activeBubble) {
                    ctx.beginPath();
                    ctx.moveTo(this.shooterPos.x, this.shooterPos.y);
                    // Simple straight line calculation (doesn't pre-calculate bounce for a clean look)
                    const lineLen = this.height * 0.6;
                    const lx = this.shooterPos.x + Math.cos(this.shooterAngle) * lineLen;
                    const ly = this.shooterPos.y + Math.sin(this.shooterAngle) * lineLen;
                    ctx.lineTo(lx, ly);
                    ctx.strokeStyle = document.documentElement.classList.contains('dark') ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Cannon Base
                ctx.beginPath();
                ctx.arc(this.shooterPos.x, this.shooterPos.y, this.bubbleRadius * 1.5, Math.PI, 0);
                ctx.fillStyle = document.documentElement.classList.contains('dark') ? '#333' : '#E5E5EA';
                ctx.fill();

                // Loaded Bubble
                if (!this.activeBubble) {
                    this.drawBubble(this.shooterPos.x, this.shooterPos.y, this.bubbleRadius, this.loadedColor);
                }

                // Next Bubble Preview
                this.drawBubble(this.width - this.bubbleRadius * 2, this.height - this.bubbleRadius * 1.5, this.bubbleRadius * 0.6, this.nextColor);
            }

            loop() {
                if (!this.isRunning) return;
                this.update();
                this.draw();
                requestAnimationFrame(this.loop.bind(this));
            }

            start() {
                this.isRunning = true;
                this.loop();
            }

            stop() {
                this.isRunning = false;
                this.removeEvents();
            }
        }
    </script>
</body>
