<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0f1a13">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🐍 SNAKE · SMOOTH + PWA</title>
    <!-- SweetAlert2 (sweet2alert) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* ----- EXACT SAME LOOK, only meta & touch enhancements under the hood ----- */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0c0b;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            touch-action: none;           /* prevent pull-to-refresh while playing */
        }

        canvas {
            display: block;
            width: 500px;
            height: 500px;
            border: 3px solid #2e8b57;
            border-radius: 16px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.7);
            background: #0f1a13;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;            /* kill browser scroll/swipe */
        }

        .splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 12, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.2s;
        }

        .splash-card {
            background: #1e2f27;
            color: #e3f2e9;
            padding: 2.5rem 3rem;
            border-radius: 48px;
            border: 2px solid #6b8c7b;
            box-shadow: 0 20px 30px #00000080, 0 0 0 2px #3b5e4b inset;
            text-align: center;
            min-width: 340px;
        }

        .splash-card h1 {
            font-size: 4rem;
            margin: 0 0 0.5rem;
            letter-spacing: 4px;
            filter: drop-shadow(0 4px 4px black);
        }

        .snake-emoji {
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .splash-btn {
            background: #2d4437;
            border: none;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 1.7rem;
            font-weight: bold;
            color: #f0ffe6;
            border-bottom: 5px solid #142116;
            border-right: 3px solid #1f3326;
            transition: 0.08s linear;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1a12;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .splash-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            box-shadow: 0 3px 0 #0f1a12;
        }

        .splash-btn.close-btn {
            background: #3f2e2e;
            border-bottom-color: #2b1c1c;
        }

        .splash-btn.settings-btn {
            background: #2c3e4e;
            border-bottom-color: #1b2a33;
        }

        .menu-float {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 30;
            background: #1e3327;
            border: 2px solid #5f9c7b;
            color: white;
            font-size: 1.7rem;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 6px 0 #0d1f13;
            transition: 0.06s linear;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-float:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0d1f13;
        }

        @media (max-width: 560px) {
            canvas {
                width: 95vw;
                height: 95vw;
                max-width: 500px;
                max-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>

        <div class="splash" id="splash">
            <div class="splash-card">
                <div class="snake-emoji">🐍 🍎</div>
                <h1>SNAKE</h1>
                <div style="font-size: 1.2rem; opacity: 0.7;">classic · full screen</div>
                <div class="button-group">
                    <button class="splash-btn" id="startBtn">▶ START</button>
                    <button class="splash-btn settings-btn" id="settingsBtn">⚙️ SETTING</button>
                    <button class="splash-btn close-btn" id="closeBtn">✕ CLOSE</button>
                </div>
            </div>
        </div>

        <button class="menu-float" id="menuBtn">🍔 MENU</button>
    </div>

    <script>
        (function() {
            // ---------- same core config ----------
            const GRID_SIZE = 20;
            const CELL_SIZE = 25;
            const CANVAS_SIZE = 500;

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const splash = document.getElementById('splash');
            const menuBtn = document.getElementById('menuBtn');

            let snake = [];
            let food = [0, 0];
            let direction = 'RIGHT';
            let nextDirection = 'RIGHT';
            let gameActive = false;
            let intervalId = null;
            let speed = 200;

            // ---------- helper: stop game ----------
            function stopGame() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                gameActive = false;
            }

            // ---------- generate food ----------
            function generateFood() {
                const maxAttempts = 3000;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const randX = Math.floor(Math.random() * GRID_SIZE);
                    const randY = Math.floor(Math.random() * GRID_SIZE);
                    if (!snake.some(seg => seg[0] === randX && seg[1] === randY)) {
                        food = [randX, randY];
                        return true;
                    }
                }
                gameOver(true);
                return false;
            }

            // ---------- reset game ----------
            function resetGame() {
                stopGame();
                snake = [[10, 10], [9, 10], [8, 10]];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                generateFood();
                draw();
            }

            // ---------- draw ----------
            function draw() {
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // subtle grid
                ctx.strokeStyle = '#2f5e42';
                ctx.lineWidth = 0.7;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                    ctx.stroke();
                }

                // snake
                ctx.fillStyle = '#9bff87';
                ctx.shadowColor = '#a3ffb5';
                ctx.shadowBlur = 8;
                snake.forEach(seg => {
                    ctx.fillRect(seg[0] * CELL_SIZE + 2, seg[1] * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                });
                ctx.shadowBlur = 0;

                // food
                ctx.fillStyle = '#ff5e5e';
                ctx.shadowColor = '#ffaaaa';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(food[0] * CELL_SIZE + CELL_SIZE/2, food[1] * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;

                // score
                ctx.font = 'bold 22px "Segoe UI", "Courier New", monospace';
                ctx.fillStyle = '#eaffdd';
                ctx.shadowColor = '#1e3d2a';
                ctx.shadowBlur = 6;
                ctx.fillText(`🍎 ${snake.length - 3}`, 12, 40);
                ctx.shadowBlur = 0;
            }

            // ---------- game over ----------
            function gameOver(win = false) {
                stopGame();
                const score = snake.length - 3;
                Swal.fire({
                    title: win ? '🏆 YOU WIN!' : '💀 GAME OVER',
                    html: `<span style="font-size:2rem;">🍎 ${score}</span><br>${win ? 'perfect board' : 'snake bit itself / wall'}`,
                    icon: win ? 'success' : 'error',
                    background: '#1f3327',
                    color: '#e1f0da',
                    confirmButtonColor: '#3b8c5e',
                    cancelButtonColor: '#6b4f4f',
                    showCancelButton: true,
                    confirmButtonText: '🐍 PLAY AGAIN',
                    cancelButtonText: 'CLOSE',
                    reverseButtons: true,
                    backdrop: `rgba(0,30,10,0.7)`
                }).then((result) => {
                    if (result.isConfirmed) {
                        resetGame();
                        splash.style.display = 'flex';
                    }
                });
            }

            // ---------- update game ----------
            function updateGame() {
                if (!gameActive) return;

                const head = snake[0];
                let newHead = [...head];
                switch (direction) {
                    case 'RIGHT': newHead[0]++; break;
                    case 'LEFT':  newHead[0]--; break;
                    case 'UP':    newHead[1]--; break;
                    case 'DOWN':  newHead[1]++; break;
                }

                // wall collision
                if (newHead[0] < 0 || newHead[0] >= GRID_SIZE || newHead[1] < 0 || newHead[1] >= GRID_SIZE) {
                    gameOver();
                    return;
                }

                const willEat = (newHead[0] === food[0] && newHead[1] === food[1]);
                let newSnake = [newHead, ...snake];
                if (!willEat) newSnake.pop();

                // self collision
                const headCollision = newSnake.slice(1).some(seg => seg[0] === newHead[0] && seg[1] === newHead[1]);
                if (headCollision) {
                    gameOver();
                    return;
                }

                snake = newSnake;

                if (willEat) {
                    if (!generateFood()) return; // gameOver triggered inside
                }

                // apply buffered direction for next move
                direction = nextDirection;
                draw();
            }

            // ---------- start game ----------
            function startGame() {
                if (gameActive) stopGame();
                gameActive = true;
                intervalId = setInterval(updateGame, speed);
            }

            // ---------- change speed ----------
            function setSpeedAndRestart(newSpeed) {
                speed = newSpeed;
                if (gameActive) {
                    clearInterval(intervalId);
                    intervalId = setInterval(updateGame, speed);
                }
            }

            // ========== SUPER SMOOTH CONTROLS ==========
            // 1. Keyboard: immediate response, no delay, respects gameActive
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                    e.preventDefault();
                }
                if (!gameActive) return;

                // Prevent 180° reverse – set nextDirection only if not opposite
                switch (key) {
                    case 'ArrowUp':    if (direction !== 'DOWN')  nextDirection = 'UP'; break;
                    case 'ArrowDown':  if (direction !== 'UP')    nextDirection = 'DOWN'; break;
                    case 'ArrowLeft':  if (direction !== 'RIGHT') nextDirection = 'LEFT'; break;
                    case 'ArrowRight': if (direction !== 'LEFT')  nextDirection = 'RIGHT'; break;
                }
            });

            // 2. TOUCH SWIPE (super smooth on mobile)
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();  // no scrolling/zooming
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();   // kill page drag
                if (!gameActive || touchStartX === 0) return;

                const touch = e.touches[0];
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;
                if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return; // dead zone

                // Determine primary direction (horizontal / vertical)
                if (Math.abs(dx) > Math.abs(dy)) {
                    // horizontal swipe
                    if (dx > 0 && direction !== 'LEFT') {
                        nextDirection = 'RIGHT';
                    } else if (dx < 0 && direction !== 'RIGHT') {
                        nextDirection = 'LEFT';
                    }
                } else {
                    // vertical swipe
                    if (dy > 0 && direction !== 'UP') {
                        nextDirection = 'DOWN';
                    } else if (dy < 0 && direction !== 'DOWN') {
                        nextDirection = 'UP';
                    }
                }
                // Reset start so we don't keep firing
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                touchStartX = 0;  // reset
            });

            // Also ensure canvas can be focused for keyboard (optional)
            canvas.setAttribute('tabindex', '0');
            canvas.style.outline = 'none';

            // ---------- BUTTON HANDLERS (same) ----------
            document.getElementById('startBtn').addEventListener('click', () => {
                splash.style.display = 'none';
                resetGame();
                startGame();
            });

            document.getElementById('closeBtn').addEventListener('click', () => {
                splash.style.display = 'none';
            });

            document.getElementById('settingsBtn').addEventListener('click', () => {
                Swal.fire({
                    title: '⚙️ SPEED SETTING',
                    input: 'radio',
                    inputOptions: {
                        '300': '🐢 Slow',
                        '200': '⚡ Medium',
                        '100': '🚀 Fast'
                    },
                    inputValue: String(speed),
                    background: '#1f3327',
                    color: '#f0ffe0',
                    confirmButtonColor: '#2e7d5e',
                    showCancelButton: true,
                    cancelButtonText: 'Cancel',
                    confirmButtonText: 'Apply',
                    backdrop: `rgba(0,20,8,0.8)`
                }).then(result => {
                    if (result.isConfirmed) {
                        setSpeedAndRestart(parseInt(result.value));
                    }
                });
            });

            menuBtn.addEventListener('click', () => {
                splash.style.display = 'flex';
            });

            // prevent context menu on canvas
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // init
            resetGame();
            splash.style.display = 'flex';
        })();
    </script>
</body>
</html>
