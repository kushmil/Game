<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Highway Racer - Made by Anshu_Rajhans</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
        }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }

        .hud {
            position: absolute; top: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 24px; font-weight: bold;
        }

        /* Splash & Menu Screens */
        .screen {
            background: rgba(10, 10, 15, 0.85); border: 2px solid #3498db;
            color: white; padding: 30px; border-radius: 15px;
            text-align: center; pointer-events: auto;
            box-shadow: 0 0 40px rgba(52, 152, 219, 0.6);
            max-width: 90%;
            backdrop-filter: blur(5px);
        }
        .hidden { display: none !important; }
        
        h1 { font-size: 38px; color: #3498db; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .credit {
            font-size: 16px; color: #bdc3c7; margin-bottom: 20px; font-style: italic;
        }
        .credit span {
            color: #f1c40f; font-weight: bold; font-style: normal; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        p { font-size: 16px; margin-bottom: 20px; color: #ecf0f1; line-height: 1.5; }

        /* Color Picker UI */
        .color-picker {
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px; border-radius: 10px;
        }
        .color-picker p { margin: 0 0 10px 0; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #aaa;}
        .swatches {
            display: flex; justify-content: center; gap: 15px;
        }
        .swatch {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch.selected { border: 3px solid #fff; transform: scale(1.2); box-shadow: 0 0 15px rgba(255,255,255,0.8); }

        button.main-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: linear-gradient(45deg, #2980b9, #3498db); color: white;
            border: none; border-radius: 8px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            width: 100%;
        }
        button.main-btn:hover { background: linear-gradient(45deg, #3498db, #2980b9); box-shadow: 0 5px 25px rgba(52, 152, 219, 0.6); }
        button.main-btn:active { transform: scale(0.95); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .control-btn {
            position: absolute; background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            color: white; font-size: 24px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; user-select: none;
            backdrop-filter: blur(5px); transition: background 0.1s;
        }
        .control-btn:active { background: rgba(255, 255, 255, 0.4); }

        /* Mobile Layout */
        #btn-left { bottom: 30px; left: 20px; width: 70px; height: 70px; }
        #btn-right { bottom: 30px; left: 110px; width: 70px; height: 70px; }
        #btn-brake { bottom: 30px; right: 110px; width: 70px; height: 70px; font-size: 14px; border-radius: 15px; background: rgba(231, 76, 60, 0.3);}
        #btn-gas { bottom: 30px; right: 20px; width: 70px; height: 70px; font-size: 16px; border-radius: 15px; background: rgba(46, 204, 113, 0.3);}
        #btn-cam { top: 20px; right: 20px; width: 50px; height: 50px; font-size: 20px; }

        @media (min-width: 768px) {
            .control-btn { display: none; }
            .controls-pc { display: block; position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px;}
        }
        @media (max-width: 767px) { .controls-pc { display: none; } }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-canvas"></div>

    <div class="ui-layer">
        <div class="hud hidden" id="hud">Score: <span id="score">0</span><br><span style="font-size:16px; color:#f1c40f;" id="speed-disp">0</span> MPH</div>
        
        <div class="controls-pc hidden" id="controls-pc">
            <b>[W/A/S/D] or [Arrows]</b>: Drive & Steer<br>
            <b>[C]</b>: Switch Camera
        </div>

        <!-- SPLASH SCREEN -->
        <div id="start-screen" class="screen">
            <h1>Highway Rush</h1>
            <div class="credit">Made by <span>Anshu_Rajhans</span></div>
            
            <div class="color-picker">
                <p>Customize Your Ride</p>
                <div class="swatches">
                    <div class="swatch selected" style="background: #e74c3c;" data-color="0xe74c3c"></div>
                    <div class="swatch" style="background: #3498db;" data-color="0x3498db"></div>
                    <div class="swatch" style="background: #2ecc71;" data-color="0x2ecc71"></div>
                    <div class="swatch" style="background: #f1c40f;" data-color="0xf1c40f"></div>
                    <div class="swatch" style="background: #9b59b6;" data-color="0x9b59b6"></div>
                    <div class="swatch" style="background: #111111;" data-color="0x222222"></div>
                </div>
            </div>

            <button class="main-btn" id="start-btn">Start Engine</button>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="game-over-screen" class="screen hidden">
            <h1 style="color: #e74c3c;">WRECKED!</h1>
            <p style="font-size: 20px;">Final Score: <b id="final-score" style="color:#f1c40f;">0</b></p>
            <button class="main-btn" id="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Mobile UI Controls -->
    <div id="mobile-controls" class="hidden">
        <div id="btn-left" class="control-btn">◀</div>
        <div id="btn-right" class="control-btn">▶</div>
        <div id="btn-brake" class="control-btn">BRK</div>
        <div id="btn-gas" class="control-btn">GAS</div>
        <div id="btn-cam" class="control-btn">📷</div>
    </div>

    <script>
        // --- VARIABLES ---
        let scene, camera, renderer;
        let playerCar, environmentGroup = new THREE.Group();
        let enemies = [], roadTexture;
        let keys = { w: false, a: false, s: false, d: false };
        
        let gameState = {
            isPlaying: false, score: 0,
            baseSpeed: 0.2, maxSpeed: 0.5, currentSpeed: 0,
            difficultyMulti: 1, spawnTimer: 0, spawnInterval: 120
        };

        let menuAnimationTime = 0; // For idle splash screen rotation

        // --- CAMERA MODES ---
        let camAngles = [
            { pos: new THREE.Vector3(0, 5, 12), look: new THREE.Vector3(0, 0, -10) },   // 3rd Person
            { pos: new THREE.Vector3(0, 25, 2), look: new THREE.Vector3(0, 0, -5) },    // Top Down
            { pos: new THREE.Vector3(0, 1.6, 0.5), look: new THREE.Vector3(0, 1.4, -20) } // Hood Cam
        ];
        let currentCamIndex = 0;

        // --- AUDIO SYSTEM ---
        let audioCtx, engineOsc, engineGain;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(30, audioCtx.currentTime); 
            engineGain = audioCtx.createGain();
            engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }
        function updateAudio() {
            if (!audioCtx || !gameState.isPlaying) return;
            let speedRatio = gameState.currentSpeed / 2.0; 
            engineOsc.frequency.setTargetAtTime(30 + (speedRatio * 200), audioCtx.currentTime, 0.1);
            engineGain.gain.setTargetAtTime(0.05 + (speedRatio * 0.1), audioCtx.currentTime, 0.1);
        }
        function playCrashSound() {
            if (!audioCtx) return;
            engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            let bufferSize = audioCtx.sampleRate * 0.5;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 600;
            let crashGain = audioCtx.createGain();
            crashGain.gain.setValueAtTime(1, audioCtx.currentTime);
            crashGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            noise.connect(filter); filter.connect(crashGain); crashGain.connect(audioCtx.destination);
            noise.start();
        }

        // --- 3D SETUP ---
        function init3D() {
            const container = document.getElementById('game-canvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 30, 150);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -20; dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -100;
            scene.add(dirLight);

            createEnvironment();
            // Default player color is Red
            playerCar = createDetailedCar(0xe74c3c, true); 
            scene.add(playerCar);
            scene.add(environmentGroup);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            // High-res Road Texture
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(0,0,512,1024);
            ctx.fillStyle = '#f1c40f'; // Yellow mid
            ctx.fillRect(246, 0, 8, 200); ctx.fillRect(258, 0, 8, 200);
            ctx.fillRect(246, 400, 8, 200); ctx.fillRect(258, 400, 8, 200);
            ctx.fillRect(246, 800, 8, 200); ctx.fillRect(258, 800, 8, 200);
            ctx.fillStyle = '#ffffff'; // White lanes
            ctx.fillRect(128, 0, 8, 150); ctx.fillRect(128, 300, 8, 150); ctx.fillRect(128, 600, 8, 150); ctx.fillRect(128, 900, 8, 150);
            ctx.fillRect(384, 0, 8, 150); ctx.fillRect(384, 300, 8, 150); ctx.fillRect(384, 600, 8, 150); ctx.fillRect(384, 900, 8, 150);
            
            roadTexture = new THREE.CanvasTexture(canvas);
            roadTexture.wrapS = THREE.RepeatWrapping; roadTexture.wrapT = THREE.RepeatWrapping;
            roadTexture.repeat.set(1, 10);

            const roadGeo = new THREE.PlaneGeometry(24, 300);
            const roadMat = new THREE.MeshStandardMaterial({ map: roadTexture, roughness: 0.8 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2; road.receiveShadow = true;
            scene.add(road);

            const grassGeo = new THREE.PlaneGeometry(300, 300);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x27ae60, roughness: 1 });
            const grass = new THREE.Mesh(grassGeo, grassMat);
            grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1; grass.receiveShadow = true;
            scene.add(grass);
            
            for(let i=0; i<40; i++) {
                let tree = createTree();
                tree.position.set((Math.random()>0.5 ? 1 : -1) * (15 + Math.random()*30), 0, -Math.random()*200);
                environmentGroup.add(tree);
            }
        }

        function createTree() {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
            trunk.position.y = 1.5; trunk.castShadow = true;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 8), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
            leaves.position.y = 4.5; leaves.castShadow = true;
            group.add(trunk, leaves); return group;
        }

        function createDetailedCar(colorHex, isPlayer) {
            const group = new THREE.Group();
            // MAIN PAINT MATERIAL - Kept in memory so we can change it dynamically from menu
            const paint = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.6, roughness: 0.2 });
            group.bodyMaterial = paint; // Store reference to material

            const darkGlass = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            const chrome = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.1 });
            const lightWhite = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lightRed = new THREE.MeshBasicMaterial({ color: 0xff0000 });

            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 4.8), paint);
            body.position.y = 0.65; body.castShadow = true; group.add(body);

            // Cabin
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.4), darkGlass);
            cabin.position.set(0, 1.3, -0.2); cabin.castShadow = true; group.add(cabin);
            
            // Roof
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.82, 0.05, 2.42), paint);
            roof.position.set(0, 1.6, -0.2); roof.castShadow = true; group.add(roof);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.5, 16);
            const rimGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.52, 8);
            const wheelPos = [[-1.1, 0.45, 1.4], [1.1, 0.45, 1.4], [-1.1, 0.45, -1.5], [1.1, 0.45, -1.5]];
            wheelPos.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, blackMat); const r = new THREE.Mesh(rimGeo, chrome);
                w.rotation.z = Math.PI/2; r.rotation.z = Math.PI/2;
                w.position.set(...pos); r.position.set(...pos); w.castShadow = true;
                group.add(w, r);
            });

            // Lights & Grille
            const grille = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 0.1), blackMat); grille.position.set(0, 0.6, -2.41);
            const hl1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.1), lightWhite); hl1.position.set(-0.8, 0.7, -2.41);
            const hl2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.1), lightWhite); hl2.position.set(0.8, 0.7, -2.41);
            const tl1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.1), lightRed); tl1.position.set(-0.8, 0.7, 2.41);
            const tl2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.1), lightRed); tl2.position.set(0.8, 0.7, 2.41);
            group.add(grille, hl1, hl2, tl1, tl2);

            if(isPlayer) {
                const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), blackMat); p1.position.set(-0.8, 1.1, 2.2);
                const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), blackMat); p2.position.set(0.8, 1.1, 2.2);
                const wing = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.05, 0.5), paint); wing.position.set(0, 1.25, 2.2);
                group.add(p1, p2, wing);
            }
            return group;
        }

        function createTruck(colorHex) {
            const group = new THREE.Group();
            const paint = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.5 });
            const cab = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.8, 2.5), paint); cab.position.set(0, 1.2, -1.5); cab.castShadow = true; group.add(cab);
            const cargo = new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.5, 4.5), new THREE.MeshStandardMaterial({color:0xffffff})); cargo.position.set(0, 1.6, 2); cargo.castShadow = true; group.add(cargo);
            const wind = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 0.1), new THREE.MeshStandardMaterial({ color: 0x111111 })); wind.position.set(0, 1.5, -2.76); group.add(wind);
            const wPos = [[-1.2, 0.5, -1], [1.2, 0.5, -1], [-1.2, 0.5, 3], [1.2, 0.5, 3]];
            wPos.forEach(pos => { const w = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x222222 })); w.rotation.z = Math.PI/2; w.position.set(...pos); w.castShadow = true; group.add(w); });
            return group;
        }

        function spawnEnemy() {
            const isTruck = Math.random() > 0.7;
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.4);
            const enemy = isTruck ? createTruck(color) : createDetailedCar(color, false);
            const lanes = [-9, -3, 3, 9];
            enemy.position.x = lanes[Math.floor(Math.random() * lanes.length)];
            enemy.position.z = -120;
            enemy.speed = (0.15 + (Math.random() * 0.1)) * gameState.difficultyMulti;
            enemy.isTruck = isTruck;
            scene.add(enemy); enemies.push(enemy);
        }

        // --- SPLASH SCREEN COLOR PICKER LOGIC ---
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                // Update UI selection
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
                e.target.classList.add('selected');
                
                // Read color hex and update Player Car material dynamically
                let newColor = parseInt(e.target.getAttribute('data-color'));
                if (playerCar && playerCar.bodyMaterial) {
                    playerCar.bodyMaterial.color.setHex(newColor);
                }
            });
        });

        // --- INPUT HANDLING ---
        function toggleCam() { if(gameState.isPlaying) currentCamIndex = (currentCamIndex + 1) % camAngles.length; }
        document.addEventListener('keydown', (e) => {
            if(e.key==='w'||e.key==='ArrowUp') keys.w = true;
            if(e.key==='s'||e.key==='ArrowDown') keys.s = true;
            if(e.key==='a'||e.key==='ArrowLeft') keys.a = true;
            if(e.key==='d'||e.key==='ArrowRight') keys.d = true;
            if(e.key.toLowerCase() === 'c') toggleCam();
        });
        document.addEventListener('keyup', (e) => {
            if(e.key==='w'||e.key==='ArrowUp') keys.w = false;
            if(e.key==='s'||e.key==='ArrowDown') keys.s = false;
            if(e.key==='a'||e.key==='ArrowLeft') keys.a = false;
            if(e.key==='d'||e.key==='ArrowRight') keys.d = false;
        });

        function bindTouch(id, keyMap, isCam=false) {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); if(isCam) toggleCam(); else keys[keyMap] = true; });
            el.addEventListener('pointerup', (e) => { e.preventDefault(); if(!isCam) keys[keyMap] = false; });
            el.addEventListener('pointerleave', (e) => { e.preventDefault(); if(!isCam) keys[keyMap] = false; });
        }
        bindTouch('btn-left', 'a'); bindTouch('btn-right', 'd');
        bindTouch('btn-gas', 'w'); bindTouch('btn-brake', 's'); bindTouch('btn-cam', null, true);

        // --- GAME LOGIC ---
        function startGame() {
            initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('controls-pc').classList.remove('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');

            gameState.isPlaying = true; gameState.score = 0;
            gameState.baseSpeed = 0.2; gameState.maxSpeed = 0.5;
            gameState.currentSpeed = 0; gameState.difficultyMulti = 1;
            gameState.spawnTimer = 0; gameState.spawnInterval = 90;

            playerCar.position.set(0, 0, 0); playerCar.rotation.y = 0;
            currentCamIndex = 0; // Reset to default game cam
            
            enemies.forEach(e => scene.remove(e)); enemies = [];

            if(audioCtx.state === 'suspended') audioCtx.resume();
            engineGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        }

        function gameOver() {
            gameState.isPlaying = false;
            playCrashSound();
            document.getElementById('final-score').innerText = Math.floor(gameState.score);
            setTimeout(() => {
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('controls-pc').classList.add('hidden');
                document.getElementById('mobile-controls').classList.add('hidden');
            }, 500);
            keys = {w:false, a:false, s:false, d:false};
        }

        function checkCollisions() {
            const pX = playerCar.position.x, pZ = playerCar.position.z;
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                let eX = e.position.x, eZ = e.position.z;
                let lengthHit = e.isTruck ? 6.5 : 4.6; 
                if(Math.abs(pX - eX) < 2.0 && Math.abs(pZ - eZ) < lengthHit) return true;
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState.isPlaying) {
                gameState.difficultyMulti += 0.0003;
                gameState.maxSpeed = 0.5 + (gameState.difficultyMulti * 0.4);
                gameState.spawnInterval = Math.max(15, 90 - (gameState.difficultyMulti * 15));

                if (keys.w) gameState.currentSpeed += 0.015;
                else if (keys.s) gameState.currentSpeed -= 0.03;
                else gameState.currentSpeed -= 0.005; 
                
                gameState.currentSpeed = Math.max(gameState.baseSpeed * gameState.difficultyMulti, Math.min(gameState.currentSpeed, gameState.maxSpeed));

                const turnSpeed = 0.2 * (gameState.currentSpeed / gameState.maxSpeed);
                if (keys.a && playerCar.position.x > -10.5) {
                    playerCar.position.x -= turnSpeed;
                    playerCar.rotation.y = Math.min(playerCar.rotation.y + 0.08, 0.2);
                } else if (keys.d && playerCar.position.x < 10.5) {
                    playerCar.position.x += turnSpeed;
                    playerCar.rotation.y = Math.max(playerCar.rotation.y - 0.08, -0.2);
                } else {
                    playerCar.rotation.y *= 0.8;
                }

                roadTexture.offset.y -= gameState.currentSpeed * 0.1;
                environmentGroup.children.forEach(tree => {
                    tree.position.z += gameState.currentSpeed;
                    if(tree.position.z > 20) tree.position.z -= 200;
                });
                
                gameState.score += gameState.currentSpeed;
                document.getElementById('score').innerText = Math.floor(gameState.score);
                document.getElementById('speed-disp').innerText = Math.floor(gameState.currentSpeed * 200);

                gameState.spawnTimer++;
                if (gameState.spawnTimer > gameState.spawnInterval) {
                    spawnEnemy(); gameState.spawnTimer = 0;
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i];
                    enemy.position.z += gameState.currentSpeed - enemy.speed;
                    if (enemy.position.z > 20) { scene.remove(enemy); enemies.splice(i, 1); }
                }

                if (checkCollisions()) gameOver();

                // Gameplay Camera Follow
                const camTarget = camAngles[currentCamIndex];
                const targetPos = playerCar.position.clone().add(camTarget.pos);
                camera.position.lerp(targetPos, 0.2);
                const lookTarget = playerCar.position.clone().add(camTarget.look);
                camera.lookAt(lookTarget);

            } else {
                // MENU IDLE ANIMATION (Awesome rotating camera effect)
                menuAnimationTime += 0.005;
                camera.position.x = Math.sin(menuAnimationTime) * 12;
                camera.position.z = Math.cos(menuAnimationTime) * 12 + playerCar.position.z;
                camera.position.y = 5 + Math.sin(menuAnimationTime * 2) * 2;
                camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 1, 0)));
                
                // Keep environment slowly scrolling in menu
                roadTexture.offset.y -= 0.002;
            }

            updateAudio();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        init3D();
    </script>
</body>
</html>
